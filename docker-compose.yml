services:
  wyoming-openclaw:
    build: .
    container_name: wyoming-openclaw
    restart: unless-stopped
    network_mode: host
    env_file: .env
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "10600"
      - "--gateway-url"
      - "${GATEWAY_URL}"
      - "--gateway-token"
      - "${GATEWAY_TOKEN}"
      - "--agent"
      - "voice"
      - "--session-user"
      - "voice-assistant"
      - "--timeout"
      - "90"
